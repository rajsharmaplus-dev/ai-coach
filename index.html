<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Synthia: AI Interviewer</title>
    <script src="https://cdn.tailwindcss.com"></script>
  <script type="importmap">
{
  "imports": {
    "react/": "https://aistudiocdn.com/react@^19.2.0/",
    "react": "https://aistudiocdn.com/react@^19.2.0",
    "@google/genai": "https://aistudiocdn.com/@google/genai@^1.28.0",
    "react-dom/": "https://aistudiocdn.com/react-dom@^19.2.0/",
    "jspdf": "https://esm.sh/jspdf@2.5.1"
  }
}
</script>
<script>
  // Setup Tailwind to use class-based dark mode
  tailwind.config = {
    darkMode: 'class',
  }
</script>
<style>
      @keyframes speaking-glow {
        0%, 100% { box-shadow: 0 0 20px 5px rgba(168, 85, 247, 0.3); }
        50% { box-shadow: 0 0 35px 15px rgba(168, 85, 247, 0.5); }
      }
      @keyframes speaking-mouth {
        0%, 100% { transform: scaleY(0.2); opacity: 0.7; }
        50% { transform: scaleY(1); opacity: 1; }
      }
      @keyframes speaking-pulse {
        0%, 100% { transform: scale(1); }
        50% { transform: scale(1.03); }
      }
      .animate-speaking-glow {
        animation: speaking-glow 1.5s ease-in-out infinite;
      }
      .animate-speaking-mouth {
        animation: speaking-mouth 0.4s ease-in-out infinite;
      }
      .animate-speaking-pulse {
        animation: speaking-pulse 1.5s ease-in-out infinite;
      }
    </style>
<link rel="stylesheet" href="/index.css">
</head>
  <body>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
